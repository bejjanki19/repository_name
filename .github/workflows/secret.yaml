name: Secret Workflow

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Print escaped secret
        run: echo "The secret is \${{ secrets.SECRET }}"

      - name: Use secret safely
        env:
          SECRET: ${{ secrets.SECRET }}
        run: |
          test -n "$SECRET"
          echo "Secret was provided safely"
